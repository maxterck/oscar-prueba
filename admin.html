<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador | Control Remoto Lr</title>
    <!-- Mismo estilo base -->
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="stylesheet" href="admin.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo">
            <h1>Admin <span>Panel</span></h1>
        </div>
        <nav>
            <ul>
                <li>
                    <a href="#" onclick="logout()" class="dropbtn" id="btn-logout" style="display:none; text-decoration:none; margin-right:10px;">
                        <i class="fas fa-sign-out-alt"></i> Salir
                    </a>
                </li>
                <li>
                    <a href="index.html" class="dropbtn" style="text-decoration:none;">
                        <i class="fas fa-store"></i> Volver a Tienda
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</header>

<!-- Overlay de Login -->
<div id="login-overlay" class="login-overlay">
    <div class="login-box">
        <h2><i class="fas fa-lock"></i> Acceso Restringido</h2>
        <p>Por favor, ingresa la contraseña para continuar.</p>
        <div class="form-group" style="margin-top: 20px;">
            <input type="password" id="admin-pass" placeholder="Contraseña...">
        </div>
        <button onclick="checkPassword()" class="btn-save" style="margin-top: 20px; width: 100%; justify-content: center;">Ingresar</button>
        <p id="login-error" style="color: var(--primary); margin-top: 10px; display: none; font-size: 0.9rem;">Contraseña incorrecta</p>
    </div>
</div>

<main class="admin-main" id="admin-content" style="display:none;">
    <section class="admin-section">
        <h2><i class="fas fa-plus-circle"></i> Agregar / Editar Producto</h2>
        <form id="product-form" class="admin-form">
            <input type="hidden" id="prod-id">
            
            <div class="form-group">
                <label>Nombre del Producto</label>
                <input type="text" id="prod-name" required placeholder="Ej: Control Samsung Smart">
            </div>

            <div class="form-group">
                <label>Subcategoría</label>
                <select id="prod-sub" required>
                    <option value="Televisor">Televisor</option>
                    <option value="Aire Acondicionado">Aire Acondicionado</option>
                    <option value="Convertidores">Convertidores</option>
                    <option value="Porton">Portón</option>
                    <option value="Limpia Contactos">Limpia Contactos</option>
                    <option value="Alcohol">Alcohol Isopropílico</option>
                    <option value="Flux">Flux / Estaño</option>
                    <option value="Routers">Routers</option>
                    <option value="Cargadores">Cargadores</option>
                    <option value="Fuentes">Fuentes</option>
                    <option value="Soldadores">Soldadores</option>
                    <option value="Testers">Testers</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>

            <div class="form-group">
                <label>Precio ($ ARS)</label>
                <input type="number" id="prod-price" required placeholder="Ej: 15000">
            </div>

            <div class="form-group">
                <label>Ruta de la Imagen</label>
                <input type="text" id="prod-img" required placeholder="Ej: Img/mifoto.jpg">
            </div>

            <div class="form-group">
                <label>Stock Disponible</label>
                <input type="number" id="prod-stock" required placeholder="Ej: 10" min="0">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Guardar Producto</button>
                <button type="button" class="btn-cancel" onclick="resetForm()" style="display:none;" id="btn-cancel">Cancelar Edición</button>
            </div>
        </form>
    </section>

    <section class="admin-section">
        <h2><i class="fas fa-list"></i> Productos Actuales (<span id="prod-count">0</span>)</h2>
        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>IMG</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="admin-product-list">
                    <!-- Filas generadas por JS -->
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="admin.js?v=4"></script>
</body>
</html>
